<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="4.css">
</head>
<body>
    <h2>Calculator</h2>
    <div class="box">
    <div class="res">
        <span class="expression"></span>
        <span id="ans"></span>
    </div>
    <div class="container">
        
        <button class="ele1" id="startB">(</button>
        <button class="ele1" id="endB">)</button>
        <button class="ele1" id="mode">%</button>
        <button class="ele1" id="CE" type="reset">CE</button>
        <button class="ele" id="seven">7</button>
        <button class="ele" id="eight">8</button>
        <button class="ele" id="nine">9</button>
        <button class="ele1" id="div">/</button>
        <button class="ele" id="four">4</button>
        <button class="ele" id="five">5</button>
        <button class="ele" id="six">6</button>
        <button class="ele1" id="multiple">*</button>
        <button class="ele" id="one">1</button>
        <button class="ele" id="two">2</button>
        <button class="ele" id="three">3</button>
        <button class="ele1" id="sub">-</button>
        <button class="ele" id="zero">0</button>
        <button class="ele" id="dec">.</button>
        <form><button id="equal" type="submit">=</button></form>
        <button class="ele1" id="add">+</button>
    </div>
    </div>
    <script src="4.js"></script>
</body>
</html>
